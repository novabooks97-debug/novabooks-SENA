  />

  <link rel="stylesheet" href="./welcome-animation.css">

</head>
<body>

  <!-- OVERLAY DE BIENVENIDA CON LIBRO 3D -->
  <div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-container">
      <!-- LIBRO 3D -->
      <div class="book-container">
        <div class="book">
          <div class="book-cover book-cover-front">
            <div class="book-content">
              <div class="book-icon">📚</div>
              <div class="book-title">NOVABOOK</div>
              <div class="book-subtitle">Tu Librería Digital</div>
            </div>
          </div>
          <div class="book-cover book-cover-back">
            <div class="book-content">
              <div class="book-text">Crea tu cuenta hoy</div>
            </div>
          </div>
          <div class="book-spine"></div>
        </div>
      </div>
      <!-- TEXTO DE BIENVENIDA -->
      <div class="welcome-text" style="margin-top: 40px; text-align: center;">
        <h2 style="color: #39ff14; font-size: 1.8rem; margin-bottom: 10px;">Bienvenido</h2>
        <p style="color: #ddd; font-size: 1rem;">Únete a la comunidad de lectores de Novabook</p>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">📚 Novabook</div>

    <nav>
      <a href="./index.php">Inicio</a>
      <a href="./libros.html">Libros</a>
      <a href="#comentarios">Comentarios</a>
      <a href="./contactanos.html">Contacto</a>
      <a href="./favoritos.html">Favoritos</a>
      <a href="./para_leer_despues.html">Para leer después</a>
      <a href="#libros-a-la-venta">Libros a la venta</a>
      <a href="./iniciar_sesion.html">Iniciar sesión</a>
      <a href="./registrarse.html">Registrarse</a>
    </nav>
  </header>

  <div class="register-container">

    <div class="register-box">
      <h1>Crear Cuenta</h1>
      <p>Únete a Novabooks 💚</p>

      <form>
        <input type="email" placeholder="Correo electrónico" required>

        <div class="password-container">
          <input type="password" id="passwordInput" placeholder="Crear contraseña" required>

          <button type="button" id="togglePassword" class="toggle-password-btn">
            👁️
          </button>
        </div>

        <input type="tel" placeholder="Número de teléfono" required>

        <button type="submit">Registrarse</button>
      </form>

      <div class="linea">o</div>

      <!-- Botón Google -->
      <button class="google-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
        Registrarse con Google
      </button>

      <p class="extra">
        ¿Ya tienes cuenta?
        <a href="./iniciar_sesion.html">Inicia sesión</a>
      </p>
    </div>

  </div>

  <script>
    const togglePasswordBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');

    togglePasswordBtn.addEventListener('click', function(e) {
      e.preventDefault();

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePasswordBtn.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        togglePasswordBtn.textContent = '👁️';
      }
    });
  </script>
  <script src="./navbar-scroll.js"></script>

  <script src="./chatbot-data.js"></script>
  <script src="./chatbot.js"></script>
  <script src="./welcome-animation.js"></script>

</body>
